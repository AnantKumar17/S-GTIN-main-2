openapi: 3.0.0
info:
  title: POS Service API
  description: Point of Sale service with counterfeit detection
  version: 1.0.0
servers:
  - url: http://localhost:3004/api
    description: Development server

tags:
  - name: Sales
    description: Sales transaction operations

paths:
  /sales:
    post:
      tags:
        - Sales
      summary: Process a sale transaction
      description: Records sale and validates SGTIN for counterfeit detection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mandt
                - sgtins
                - storeId
              properties:
                mandt:
                  type: string
                  example: "100"
                sgtins:
                  type: array
                  items:
                    type: string
                  example: ["01040123456789012112345678"]
                storeId:
                  type: string
                  example: "STORE-001"
                cashierId:
                  type: string
                  example: "CASHIER-123"
                totalAmount:
                  type: number
                  format: float
                  example: 99.99
      responses:
        '200':
          description: Sale processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  saleId:
                    type: string
                    example: "SALE-2026-0001"
                  validItems:
                    type: array
                    items:
                      type: object
                      properties:
                        sgtin:
                          type: string
                        productName:
                          type: string
                  invalidItems:
                    type: array
                    items:
                      type: object
                      properties:
                        sgtin:
                          type: string
                        reason:
                          type: string
                          enum: [COUNTERFEIT, ALREADY_SOLD, NOT_FOUND, WRONG_STORE]
                        details:
                          type: string
        '400':
          description: Invalid request or counterfeit detected
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  counterfeit:
                    type: boolean
                  invalidItems:
                    type: array
        '500':
          description: Server error

  /sales/{saleId}:
    get:
      tags:
        - Sales
      summary: Get sale details
      description: Returns detailed information about a sale transaction
      parameters:
        - in: path
          name: saleId
          required: true
          schema:
            type: string
        - in: query
          name: mandt
          required: true
          schema:
            type: string
            example: "100"
      responses:
        '200':
          description: Sale details
          content:
            application/json:
              schema:
                type: object
                properties:
                  saleId:
                    type: string
                  storeId:
                    type: string
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        sgtin:
                          type: string
                        productName:
                          type: string
                        price:
                          type: number
                  totalAmount:
                    type: number
                  soldAt:
                    type: string
                    format: date-time
        '404':
          description: Sale not found
        '500':
          description: Server error

  /sales/counterfeit-logs:
    get:
      tags:
        - Sales
      summary: Get counterfeit detection logs
      description: Returns list of detected counterfeit scan attempts
      parameters:
        - in: query
          name: mandt
          required: true
          schema:
            type: string
            example: "100"
        - in: query
          name: fromDate
          schema:
            type: string
            format: date
        - in: query
          name: toDate
          schema:
            type: string
            format: date
        - in: query
          name: storeId
          schema:
            type: string
      responses:
        '200':
          description: Counterfeit detection logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                      properties:
                        sgtin:
                          type: string
                        detectedAt:
                          type: string
                          format: date-time
                        storeId:
                          type: string
                        reason:
                          type: string
        '500':
          description: Server error
